<!-- homepage gallery -->
<div class="container">
  <div class="d-flex flex-wrap flex-row justify-content-between">
    {% for item in carousel %}
      <div class="col-12 col-sm-6 col-lg-4 px-2 my-2">
        <div class="card frontpage-gallery">
          <a href="{{ item.url }}">
            <img class="card-img institution" src="{{ item.img if item.img.startswith('http') else pathto('_images/' + item.img, 1) }}" alt="{{ item.alt }}">
            <div class="card-img-overlay px-3 py-1">
              <p class="lead mb-1 fadeout">{{ item.title }}</p>
              <p class="card-text fadeout">{{ item.text }}</p>
            </div>
          </a>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
<!-- sponsors -->
<div class="container my-4">
  <p class="h4 text-center font-weight-light">Current Sponsors & Partner Institutions</p>
  <div id="sponsor-logos" class="d-flex flex-wrap flex-row justify-content-center align-items-center">
    <!-- current funders -->
    {% for item in sponsors -%}
      <div class="card my-1 mx-2 {{ item.klass }}" style="{{ 'width: ' + item.size + 'rem;' }}">
        <a href="{{ pathto('credit/funding.html', 1) }}">
            <img class="card-img" src="{{ pathto('_static/funding/' + item.img, 1) }}" title="{{ item.title }}" alt="{{ item.title }}">
        </a>
      </div>
    {% endfor %}
    <!-- current partner institutions -->
    {% for inst in institutions -%}
      <div class="card my-1 mx-2 {{ inst.klass }}" style="{{ 'width: ' + inst.size + 'rem;' }}">
        <a href="{{ pathto('credit/funding.html#supporting-institutions', 1) }}">
          <img class="card-img" src="{{ pathto('_static/institution_logos/' + inst.img, 1) }}" title="{{ inst.name }}" alt="{{ inst.name }}"/>
        </a>
      </div>
    {% endfor %}
  </div>
</div>
<!-- contributor avatars -->
<div class="container my-4">
{% include 'avatars.html' %}
</div>
